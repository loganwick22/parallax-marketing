  <style>
    :root {
      --bg: #0a0a0a;
      --text: #ffffff;
      --text-dim: #999999;
      --grad: linear-gradient(100deg, #FF6B2B 0%, #E63C6B 50%, #9B51E0 100%);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 32px;
      position: relative;
      overflow: hidden;
    }
    /* subtle color wash behind content */
    body::before {
      content: "";
      position: absolute;
      top: 40%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 900px;
      height: 700px;
      max-width: 120vw;
      background: radial-gradient(ellipse at center, rgba(155, 81, 224, 0.22) 0%, rgba(255, 107, 43, 0.08) 38%, transparent 70%);
      pointer-events: none;
      z-index: 0;
    }
    .wrap { position: relative; z-index: 1; }
    .logo { display: inline-block; line-height: 1; margin-bottom: 48px; }
    .logo .mark {
      font-size: 19px;
      font-weight: 700;
      letter-spacing: 0.15em;
      color: #fff;
    }
    .logo .sub {
      display: block;
      font-size: 9.5px;
      font-weight: 500;
      letter-spacing: 0.32em;
      color: var(--text-dim);
      margin-top: 3px;
    }
    .code {
      font-size: clamp(80px, 18vw, 150px);
      font-weight: 900;
      line-height: 1;
      letter-spacing: -0.04em;
      background: var(--grad);
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
      color: transparent;
    }
    h1 {
      font-size: clamp(24px, 4vw, 34px);
      font-weight: 700;
      letter-spacing: -0.02em;
      margin-top: 12px;
    }
    p {
      color: var(--text-dim);
      font-size: 17px;
      margin-top: 14px;
      max-width: 420px;
      margin-left: auto;
      margin-right: auto;
      line-height: 1.6;
    }
    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      font-family: inherit;
      font-size: 15px;
      font-weight: 600;
      letter-spacing: -0.01em;
      padding: 15px 30px;
      margin-top: 32px;
      border-radius: 100px;
      border: 1px solid transparent;
      text-decoration: none;
      cursor: pointer;
      background: var(--grad);
      color: #fff;
      box-shadow: 0 6px 22px rgba(230, 60, 107, 0.22);
      transition: transform .25s ease, box-shadow .3s ease;
    }
    .btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 0 34px rgba(255, 107, 43, 0.55), 0 8px 28px rgba(155, 81, 224, 0.35);
    }
    @media (prefers-reduced-motion: reduce) {
      html { scroll-behavior: auto; }
      .btn { transition: none; }
    }
  </style>
